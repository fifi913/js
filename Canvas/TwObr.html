<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas width="400" height="200" id="canvas"></canvas></canvas>

<script>
    const canvas=document.querySelector("#canvas")
    const ctx=canvas.getcontext("2d");

    ctx.beginpatch();
    ctx.moveto(20,20)
    ctx.lineto(40,70);
    ctx.lineto(50.40);
    ctx.stroke();
    
</script>
</body>
</html>
